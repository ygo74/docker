version: "3.8"

services:
  # Tempo runs as user 10001, and docker compose creates the volume as root.
  # As such, we need to chown the volume in order for Tempo to start correctly.
  init:
    image: &tempoImage grafana/tempo:latest
    user: root
    entrypoint:
      - "chown"
      - "10001:10001"
      - "/var/tempo"
    volumes:
      - ./volumes/tempo/tempo_data:/var/tempo

  # Tempo - Distributed tracing backend
  tempo:
    image: *tempoImage
    command: [ "-config.file=/etc/tempo.yaml" ]
    volumes:
      - ./volumes/tempo/tempo.yaml:/etc/tempo.yaml
      - ./volumes/tempo/tempo_data:/var/tempo
    ports:
      - "3200:3200"   # tempo API and UI
      # - "4317:4317"   # otlp grpc (changé pour exposer directement le port)
      # - "4318:4318"   # otlp http (changé pour exposer directement le port)
    networks:
      - shared-observability

  # Loki - Log aggregation system
  loki:
    image: grafana/loki:latest
    command: [ "-config.file=/etc/loki/local-config.yaml" ]
    volumes:
      - ./volumes/loki/loki.yaml:/etc/loki/local-config.yaml
      - loki_data:/loki
    ports:
      - "3100:3100"
    networks:
      - shared-observability

  # Prometheus - Metrics database
  prometheus:
    image: prom/prometheus:latest
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.console.libraries=/etc/prometheus/console_libraries
      - --web.console.templates=/etc/prometheus/consoles
      - --storage.tsdb.retention.time=200h
      - --web.enable-lifecycle
    volumes:
      - ./volumes/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - shared-observability

  # Grafana - Visualization dashboard
  grafana:
    image: grafana/grafana:latest
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=
      # Ajout de ces options pour empêcher la vérification des signatures de plugins
      - GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS=grafana-exploretraces-app,grafana-pyroscope-app,grafana-metricsdrilldown-app,grafana-lokiexplore-app
      - GF_PLUGINS_PLUGIN_ADMIN_ENABLED=true
      # Ajout de cette option pour attendre que les datasources soient disponibles
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning

      # DB Postgres 👇
      - GF_DATABASE_TYPE=postgres
      - GF_DATABASE_HOST=postgres:5432
      - GF_DATABASE_NAME=grafana
      - GF_DATABASE_USER=grafana
      - GF_DATABASE_PASSWORD=grafana
      - GF_DATABASE_SSL_MODE=disable

    volumes:
      - ./volumes/grafana/provisioning:/etc/grafana/provisioning
      # - ./backends/grafana/dashboards:/var/lib/grafana/dashboards
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    networks:
      - shared-observability
      - shared-db
    # Attendre que ces services soient disponibles avant de démarrer Grafana
    depends_on:
      - prometheus
      - loki
      - tempo

  # OpenTelemetry Collector
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./volumes/otel-collector/otel-collector-config.yaml:/etc/otel-collector-config.yaml
    ports:
      # - "8888:8888"   # Prometheus metrics
      # - "8889:8889"   # Prometheus exporter metrics
      - "13133:13133" # health_check extension
      - "4317:4317"   # Changé pour ne pas conflit avec Tempo
      - "4318:4318"   # Changé pour ne pas conflit avec Tempo
    depends_on:
      - tempo
      - loki
      - prometheus
    networks:
      - shared-observability

volumes:
  keycloak_data:
  tempo_data:
  loki_data:
  prometheus_data:
  grafana_data:

networks:
  shared-observability:
    external: true
    name: shared-observability
  shared-db:
    external: true
    name: shared-db
